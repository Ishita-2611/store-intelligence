services:
  api:
    build:
      context: .
      args:
        INSTALL_GPU: "true"
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      UPLOAD_MAX_SECONDS: "0"
      UPLOAD_SAMPLE_STRIDE: "6"
      UPLOAD_USE_SAMPLE_EVENTS: "false"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
